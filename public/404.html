<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Page Not Found | akindele.dev</title>
  <meta name="description" content="The page you are looking for does not exist.">

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #0A0F1E;
      --navy2: #111827;
      --indigo: #4F46E5;
      --indigo2: #6366F1;
      --amber: #F59E0B;
      --off: #F0EDE6;
      --slate: #94A3B8;
      --white: #FFFFFF;
      --card-bg: #141C2E;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--off);
      line-height: 1.6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* Grid background from your hero section */
    .hero-grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(79, 70, 229, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 70, 229, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      padding: 2rem;
    }

    .error-code {
      font-family: 'Fraunces', serif;
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 300;
      color: var(--white);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .error-code em {
      font-style: italic;
      color: var(--amber);
    }

    .terminal-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--indigo2);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    .message {
      color: var(--slate);
      font-weight: 300;
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--indigo);
      color: var(--white);
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.04em;
      padding: 0.75rem 1.6rem;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-primary:hover {
      background: var(--indigo2);
      transform: translateY(-1px);
    }

    .ico {
      display: inline-block;
      width: 1em;
      height: 1em;
      vertical-align: middle;
      fill: currentColor;
    }
  </style>
</head>

<body>
  <div class="hero-grid-bg"></div>
  
  <div class="container">
    <div class="terminal-label">~ / cd nowhere</div>
    <h1 class="error-code">40<em>4</em></h1>
    <p class="message">The route you requested couldn't be found. It might have been moved, deleted, or never existed in the first place.</p>
    
    <a href="/" class="btn-primary">
      <svg class="ico" viewBox="0 0 24 24">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </svg>
      Return to Base
    </a>
  </div>
</body>

</html>
